<!DOCTYPE html>
<html>
<head>
    <title>Card System</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        button {
            padding: 10px 15px;
            margin: 10px;
            border: none;
            background: #007bff;
            color: white;
            cursor: pointer;
            border-radius: 6px;
        }

        button:hover {
            background: #0056b3;
        }

        #message {
            color: red;
            font-weight: bold;
        }

        #count {
            font-size: 18px;
            margin: 10px;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 15px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: left;
            position: relative;
        }

        .card h3 {
            margin: 5px 0;
            color: #333;
        }

        .card p {
            font-size: 14px;
            color: #666;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            background: green;
            border: none;
            color: white;
            padding: 5px 8px;
            border-radius: 5px;
            cursor: pointer;
        }

        .delete-btn:hover {
            background: darkred;
        }
    </style>
</head>

<body>

<h1>Card Creator</h1>

<button onclick="createCard()">Create Card</button>

<div id="count">Counts: 0 / 10</div>
<div id="message"></div>

<div id="container"></div>

<script>
let count = 0;
let maxLimit = 10;
let cardNumber = 1;

function createCard() {
    let container = document.getElementById("container");
    let message = document.getElementById("message");

    if (count >= maxLimit) {
        message.textContent = "your limit is finished";
        return;
    }

    message.textContent = "";

    let card = document.createElement("div");
    card.className = "card";

    let heading = document.createElement("h3");
    heading.textContent = "Card #" + String(cardNumber).padStart(2, '0');

    let title = document.createElement("h4");
    title.textContent = "Card Heading";

    let timeText = document.createElement("p");
    let createdTime = new Date();
    timeText.textContent = "Created just now";

    // update time every minute
    setInterval(() => {
        let now = new Date();
        let diff = Math.floor((now - createdTime) / 60000);

        if (diff === 0) {
            timeText.textContent = "Created just now";
        } else {
            timeText.textContent = "Created " + diff + " minute(s) ago";
        }
    }, 60000);

    let deleteBtn = document.createElement("button");
    deleteBtn.textContent = "X";
    deleteBtn.className = "delete-btn";

    deleteBtn.onclick = function() {
        card.remove();
        count--;
        updateCount();
        message.textContent = "";
    };

    card.appendChild(deleteBtn);
    card.appendChild(heading);
    card.appendChild(title);
    card.appendChild(timeText);

    container.appendChild(card);

    count++;
    cardNumber++;
    updateCount();
}

function updateCount() {
    document.getElementById("count").textContent = "count: " + count + " / 10";
}
</script>

</body>
</html>
